<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>MOAI FIGHT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#000;
overflow:hidden;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#game{
position:relative;
width:390px;
height:780px;
border:3px solid #ffd000;
overflow:hidden;
box-shadow:0 0 35px #ffd000;
border-radius:8px;
background:#000;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.hud{
position:absolute;
top:12px;
left:12px;
right:12px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.hp{
width:120px;
height:18px;
border:2px solid #ffd000;
border-radius:30px;
overflow:hidden;
background:#111;
}

.fill{
height:100%;
background:linear-gradient(90deg,#00ff88,#ffd000);
transition:.2s;
}

#timer{
color:#ffd000;
font-size:28px;
font-weight:bold;
}

.fighter{
position:absolute;
width:150px;
height:230px;
bottom:120px;
transition:.08s linear;
}

.body{
position:absolute;
width:150px;
height:230px;
object-fit:contain;
filter:drop-shadow(0 0 8px #000);
}

.faceBox{
position:absolute;
top:18px;
left:46px;

width:58px;
height:58px;

border-radius:50%;
overflow:hidden;

border:2px solid #fff;
z-index:10;
}

.face{
position:absolute;

width:150px;
height:230px;

left:-46px;
top:-18px;

object-fit:contain;
}

#p1{
left:20px;
}

#p2{
right:20px;
transform:scaleX(-1);
}

.controls{
position:absolute;
bottom:14px;
left:12px;
right:12px;
display:flex;
justify-content:space-between;
z-index:200;
}

.group{
display:flex;
gap:8px;
}

.btn{
width:58px;
height:58px;
border-radius:14px;
border:2px solid #ffd000;
background:#111;
color:#ffd000;
font-size:24px;
font-weight:bold;
}

.btn:active{
transform:scale(.88);
}

.jump{
animation:jump .6s linear;
}

.punch{
animation:punch .25s linear;
}

.kick{
animation:kick .25s linear;
}

.hit{
animation:hit .25s linear;
}

@keyframes jump{

0%{
bottom:120px;
}

50%{
bottom:220px;
}

100%{
bottom:120px;
}

}

@keyframes punch{

0%{
transform:translateX(0);
}

50%{
transform:translateX(25px);
}

100%{
transform:translateX(0);
}

}

@keyframes kick{

0%{
transform:translateX(0);
}

50%{
transform:translateX(30px) rotate(-6deg);
}

100%{
transform:translateX(0);
}

}

@keyframes hit{

0%{
filter:brightness(1);
}

50%{
filter:brightness(3);
}

100%{
filter:brightness(1);
}

}

.win{
position:absolute;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:500;
}

.win h1{
color:#ffd000;
font-size:42px;
}

.win button{
margin-top:20px;
padding:14px 26px;
font-size:20px;
background:#111;
color:#ffd000;
border:2px solid #ffd000;
border-radius:12px;
}

</style>
</head>

<body>

<div id="game">

<img src="Background.png" class="bg">

<div class="hud">

<div class="hp">
<div class="fill" id="hp1"></div>
</div>

<div id="timer">60</div>

<div class="hp">
<div class="fill" id="hp2"></div>
</div>

</div>

<div class="fighter" id="p1">

<img src="Hero1.png" class="body">

<div class="faceBox">
<img src="Hero1.png" class="face">
</div>

</div>

<div class="fighter" id="p2">

<img src="Enemy1.png" class="body">

<div class="faceBox">
<img src="Enemy1.png" class="face">
</div>

</div>

<div class="controls">

<div class="group">

<button class="btn" id="left">◀</button>

<button class="btn" id="right">▶</button>

<button class="btn" id="jump">↑</button>

</div>

<div class="group">

<button class="btn" id="kick">🦶</button>

<button class="btn" id="punch">👊</button>

</div>

</div>

<div class="win" id="winBox">

<h1 id="winText">YOU WIN</h1>

<button onclick="location.reload()">
PLAY AGAIN
</button>

</div>

</div>

<script>

const p1=document.getElementById("p1");
const p2=document.getElementById("p2");

const hp1=document.getElementById("hp1");
const hp2=document.getElementById("hp2");

let x1=20;
let x2=220;

let playerHP=100;
let enemyHP=100;

function render(){

p1.style.left=x1+"px";
p2.style.left=x2+"px";

hp1.style.width=playerHP+"%";
hp2.style.width=enemyHP+"%";

}

render();

document.getElementById("left").onclick=()=>{

x1-=18;

if(x1<0)x1=0;

render();

};

document.getElementById("right").onclick=()=>{

x1+=18;

if(x1>230)x1=230;

render();

};

document.getElementById("jump").onclick=()=>{

p1.classList.add("jump");

setTimeout(()=>{

p1.classList.remove("jump");

},600);

};

document.getElementById("punch").onclick=()=>{

p1.classList.add("punch");

setTimeout(()=>{

p1.classList.remove("punch");

},250);

attack(10);

};

document.getElementById("kick").onclick=()=>{

p1.classList.add("kick");

setTimeout(()=>{

p1.classList.remove("kick");

},250);

attack(15);

};

function attack(dmg){

let dist=Math.abs(x1-x2);

if(dist<120){

enemyHP-=dmg;

if(enemyHP<0)enemyHP=0;

p2.classList.add("hit");

setTimeout(()=>{

p2.classList.remove("hit");

},250);

render();

checkWin();

}

}

function enemyAI(){

let move=Math.random();

if(move>.5){

x2-=12;

}else{

x2+=12;

}

if(x2<140)x2=140;
if(x2>240)x2=240;

let dist=Math.abs(x1-x2);

if(dist<120){

playerHP-=5;

if(playerHP<0)playerHP=0;

p1.classList.add("hit");

setTimeout(()=>{

p1.classList.remove("hit");

},250);

}

render();

checkWin();

}

setInterval(enemyAI,700);

function checkWin(){

if(enemyHP<=0){

document.getElementById("winBox").style.display="flex";

document.getElementById("winText").innerText="YOU WIN";

}

if(playerHP<=0){

document.getElementById("winBox").style.display="flex";

document.getElementById("winText").innerText="YOU LOSE";

}

}

let time=60;

setInterval(()=>{

time--;

document.getElementById("timer").innerText=time;

if(time<=0){

if(playerHP>enemyHP){

document.getElementById("winText").innerText="YOU WIN";

}else if(enemyHP>playerHP){

document.getElementById("winText").innerText="YOU LOSE";

}else{

document.getElementById("winText").innerText="DRAW";

}

document.getElementById("winBox").style.display="flex";

}

},1000);

</script>

</body>
</html>
