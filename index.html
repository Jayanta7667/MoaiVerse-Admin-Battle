<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoaiVerse Admin Battle</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
width:100vw;
height:100vh;
background:url('Background.png') center/cover no-repeat;
position:relative;
overflow:hidden;
}

#title{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px black;
z-index:10;
}

.hero,.enemy{
position:absolute;
bottom:80px;
width:180px;
height:300px;
transition:0.25s;
}

.hero{
left:10px;
}

.enemy{
right:10px;
transform:scaleX(-1);
}

.hero img,.enemy img{
width:100%;
height:100%;
object-fit:contain;
filter:drop-shadow(0 0 10px black);
}

.health{
position:absolute;
top:20px;
width:140px;
height:18px;
background:#222;
border-radius:20px;
overflow:hidden;
border:2px solid white;
}

#heroHealth{
left:10px;
}

#enemyHealth{
right:10px;
}

.bar{
width:100%;
height:100%;
background:lime;
transition:0.3s;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:10;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,purple,deeppink);
color:white;
font-size:14px;
font-weight:bold;
box-shadow:0 0 10px purple;
}

.hit{
animation:hitAnim 0.2s linear;
}

@keyframes hitAnim{
0%{transform:translateX(0);}
25%{transform:translateX(-20px);}
50%{transform:translateX(20px);}
100%{transform:translateX(0);}
}

.flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.flashActive{
animation:flashAnim 0.2s linear;
}

@keyframes flashAnim{
0%{opacity:0.7;}
100%{opacity:0;}
}

</style>
</head>

<body>

<div id="game">

<div class="flash" id="flash"></div>

<div id="title">
MOAIVERSE ADMIN BATTLE
</div>

<div id="heroHealth" class="health">
<div id="heroBar" class="bar"></div>
</div>

<div id="enemyHealth" class="health">
<div id="enemyBar" class="bar"></div>
</div>

<div class="hero" id="hero">
<img id="heroImage" src="Hero1.png">
</div>

<div class="enemy" id="enemy">
<img id="enemyImage" src="Enemy1.png">
</div>

<div id="controls">
<button onclick="attack()">
ATTACK
</button>

<button onclick="changeHero()">
CHANGE HERO
</button>
</div>

</div>

<audio id="hitSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav">
</audio>

<script>

let heroHP = 100;
let enemyHP = 100;

let heroIndex = 1;
let enemyIndex = 1;

function attack(){

document.getElementById("hitSound").play();

enemyHP -= 20;

if(enemyHP < 0){
enemyHP = 0;
}

document.getElementById("enemyBar").style.width =
enemyHP + "%";

document.getElementById("enemy").classList.add("hit");

document.getElementById("flash").classList.add("flashActive");

setTimeout(()=>{
document.getElementById("enemy").classList.remove("hit");
document.getElementById("flash").classList.remove("flashActive");
},200);

if(enemyHP == 0){

setTimeout(()=>{

alert("Enemy Defeated!");

enemyHP = 100;

enemyIndex++;

if(enemyIndex > 4){
enemyIndex = 1;
}

document.getElementById("enemyBar").style.width =
"100%";

document.getElementById("enemyImage").src =
"Enemy" + enemyIndex + ".png";

},300);

}

}

function changeHero(){

heroIndex++;

if(heroIndex > 4){
heroIndex = 1;
}

document.getElementById("heroImage").src =
"Hero" + heroIndex + ".png";

}

</script>

</body>
</html>
