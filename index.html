<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOAIVERSE ADMIN BATTLE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.player{
position:absolute;
bottom:70px;
width:130px;
height:260px;
object-fit:contain;
transition:0.1s;
}

#hero{
left:40px;
}

#enemy{
right:40px;
transform:scaleX(-1);
}

.hpbar{
position:absolute;
top:20px;
width:140px;
height:20px;
border:2px solid white;
border-radius:20px;
background:#222;
overflow:hidden;
}

#heroBar{
left:10px;
}

#enemyBar{
right:10px;
}

.hp{
height:100%;
width:100%;
background:lime;
transition:0.2s;
}

#title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-weight:bold;
font-size:18px;
}

.controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 15px;
}

.leftBtns,
.rightBtns{
display:flex;
gap:10px;
}

button{
width:70px;
height:70px;
border:none;
border-radius:20px;
font-size:28px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(5px);
}

button:active{
transform:scale(0.9);
background:#ff00ff;
}

.hit{
animation:hit 0.2s;
}

@keyframes hit{
0%{transform:translateX(0);}
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
100%{transform:translateX(0);}
}

.jump{
animation:jump 0.5s;
}

@keyframes jump{
0%{bottom:70px;}
50%{bottom:220px;}
100%{bottom:70px;}
}

</style>
</head>

<body>

<div id="game">

<img id="bg" src="Background.png">

<div id="title">MOAIVERSE ADMIN BATTLE</div>

<div id="heroBar" class="hpbar">
<div id="heroHp" class="hp"></div>
</div>

<div id="enemyBar" class="hpbar">
<div id="enemyHp" class="hp"></div>
</div>

<img id="hero" class="player" src="Hero2.png">
<img id="enemy" class="player" src="Enemy1.png">

<div class="controls">

<div class="leftBtns">
<button onclick="moveLeft()">◀</button>
<button onclick="moveRight()">▶</button>
</div>

<div class="rightBtns">
<button onclick="attack()">👊</button>
<button onclick="jump()">⬆</button>
</div>

</div>

</div>

<script>

let hero=document.getElementById("hero");
let enemy=document.getElementById("enemy");

let heroX=40;
let enemyHp=100;

function moveLeft(){
heroX-=20;

if(heroX<0){
heroX=0;
}

hero.style.left=heroX+"px";
}

function moveRight(){
heroX+=20;

if(heroX>window.innerWidth-150){
heroX=window.innerWidth-150;
}

hero.style.left=heroX+"px";
}

function attack(){

hero.classList.add("hit");

setTimeout(()=>{
hero.classList.remove("hit");
},200);

let heroRect=hero.getBoundingClientRect();
let enemyRect=enemy.getBoundingClientRect();

if(heroRect.right > enemyRect.left){

enemy.classList.add("hit");

setTimeout(()=>{
enemy.classList.remove("hit");
},200);

enemyHp-=10;

if(enemyHp<0){
enemyHp=0;
}

document.getElementById("enemyHp").style.width=enemyHp+"%";

if(enemyHp==0){
alert("YOU WIN 🔥");
}
}
}

function jump(){

hero.classList.add("jump");

setTimeout(()=>{
hero.classList.remove("jump");
},500);

}

</script>

</body>
</html>
