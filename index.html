<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOAIVERSE ADMIN BATTLE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:black;
}

.game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

/* Background */

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

/* Arena */

.floor{
position:absolute;
bottom:0;
width:100%;
height:35%;
background:linear-gradient(to top,#23234d,#4f59ff);
opacity:0.4;
}

/* Top UI */

.top-ui{
position:absolute;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
z-index:10;
}

.hp-box{
width:35%;
}

.hp-name{
color:white;
font-size:14px;
margin-bottom:4px;
text-shadow:0 0 5px black;
}

.hp{
width:100%;
height:18px;
background:#222;
border:2px solid white;
border-radius:20px;
overflow:hidden;
}

.hp-fill{
width:100%;
height:100%;
background:red;
}

.timer{
color:yellow;
font-size:40px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* Characters */

.player{
position:absolute;
bottom:90px;
width:180px;
z-index:5;
transition:0.2s;
}

.left{
left:40px;
}

.right{
right:40px;
transform:scaleX(-1);
}

.player img{
width:100%;
height:auto;
filter:drop-shadow(0 0 12px black);
}

/* Idle animation */

.left{
animation:leftIdle 1s infinite alternate;
}

.right{
animation:rightIdle 1s infinite alternate;
}

@keyframes leftIdle{
from{
transform:translateY(0px);
}
to{
transform:translateY(-10px);
}
}

@keyframes rightIdle{
from{
transform:scaleX(-1) translateY(0px);
}
to{
transform:scaleX(-1) translateY(-10px);
}
}

/* Controls */

.controls-left{
position:absolute;
bottom:20px;
left:20px;
display:flex;
gap:15px;
z-index:10;
}

.controls-right{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:15px;
z-index:10;
}

.btn{
width:75px;
height:75px;
border-radius:50%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(5px);
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
color:white;
border:3px solid rgba(255,255,255,0.5);
}

/* Hit effect */

.hit{
position:absolute;
width:100px;
height:100px;
border-radius:50%;
background:rgba(255,0,0,0.5);
filter:blur(25px);
display:none;
z-index:4;
}

/* Mobile */

@media(max-width:700px){

.player{
width:120px;
bottom:110px;
}

.left{
left:10px;
}

.right{
right:10px;
}

.timer{
font-size:28px;
}

.btn{
width:60px;
height:60px;
font-size:28px;
}

}

</style>
</head>

<body>

<div class="game">

<img src="Background.png" class="bg">

<div class="floor"></div>

<!-- UI -->

<div class="top-ui">

<div class="hp-box">
<div class="hp-name">PLAYER</div>
<div class="hp">
<div class="hp-fill" id="hp1"></div>
</div>
</div>

<div class="timer" id="timer">
40
</div>

<div class="hp-box">
<div class="hp-name" style="text-align:right;">ENEMY</div>
<div class="hp">
<div class="hp-fill" id="hp2"></div>
</div>
</div>

</div>

<!-- Players -->

<div class="player left" id="leftPlayer">
<img src="Hero1.png">
</div>

<div class="player right" id="rightPlayer">
<img src="Enemy1.png">
</div>

<!-- Controls -->

<div class="controls-left">
<div class="btn" onclick="moveLeft()">◀</div>
<div class="btn" onclick="moveRight()">▶</div>
</div>

<div class="controls-right">
<div class="btn" onclick="attack()">👊</div>
<div class="btn" onclick="jump()">▲</div>
</div>

</div>

<script>

let hp1 = 100;
let hp2 = 100;

let leftPlayer = document.getElementById("leftPlayer");

let position = 10;

function moveLeft(){

position -= 20;

if(position < 0){
position = 0;
}

leftPlayer.style.left = position + "px";

}

function moveRight(){

position += 20;

if(position > window.innerWidth - 140){
position = window.innerWidth - 140;
}

leftPlayer.style.left = position + "px";

}

function attack(){

let enemy = document.getElementById("rightPlayer");

enemy.style.transform = "scaleX(-1) translateX(30px)";

hp2 -= 10;

if(hp2 < 0){
hp2 = 0;
}

document.getElementById("hp2").style.width = hp2 + "%";

setTimeout(()=>{
enemy.style.transform = "scaleX(-1)";
},200);

}

function jump(){

leftPlayer.style.bottom = "180px";

setTimeout(()=>{
leftPlayer.style.bottom = "110px";
},300);

}

/* Timer */

let time = 40;

setInterval(()=>{

time--;

if(time < 0){
time = 0;
}

document.getElementById("timer").innerText = time;

},1000);

</script>

</body>
</html>
