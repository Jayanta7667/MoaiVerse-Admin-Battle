<style>

/* FULL GAME FIX */

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

.game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.75);
}

/* FLOOR */

.floor{
position:absolute;
bottom:0;
width:100%;
height:22%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(2px);
border-top:4px solid rgba(255,255,255,0.2);
}

/* TOP UI */

.top{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
z-index:20;
}

.hp{
width:32%;
height:18px;
background:#222;
border-radius:20px;
overflow:hidden;
border:2px solid white;
}

.fill{
width:100%;
height:100%;
background:red;
}

.timer{
color:yellow;
font-size:34px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* CHARACTERS */

.character{
position:absolute;
bottom:90px;
width:150px;
transition:0.15s;
z-index:10;
}

/* LEFT */

.left{
left:40px;
animation:leftIdle 1s infinite alternate;
}

/* RIGHT */

.right{
right:40px;
transform:scaleX(-1);
animation:rightIdle 1s infinite alternate;
}

/* IMAGE */

.character img{
width:100%;
height:auto;
object-fit:contain;
filter:drop-shadow(0 0 15px black);
}

/* IDLE */

@keyframes leftIdle{
from{
transform:translateY(0px);
}
to{
transform:translateY(-8px);
}
}

@keyframes rightIdle{
from{
transform:scaleX(-1) translateY(0px);
}
to{
transform:scaleX(-1) translateY(-8px);
}
}

/* BUTTONS */

.controls-left{
position:absolute;
bottom:20px;
left:20px;
display:flex;
gap:15px;
z-index:20;
}

.controls-right{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:15px;
z-index:20;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,0.18);
border:3px solid rgba(255,255,255,0.4);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
backdrop-filter:blur(4px);
}

/* MOBILE */

@media(max-width:700px){

.character{
width:120px;
bottom:110px;
}

.left{
left:5px;
}

.right{
right:5px;
}

.btn{
width:60px;
height:60px;
font-size:25px;
}

.timer{
font-size:26px;
}

}

</style>

<script>

/* PLAYER */

const player = document.querySelector(".left");

let pos = 5;

/* MOVE LEFT */

function moveLeft(){

pos -= 20;

if(pos < 0){
pos = 0;
}

player.style.left = pos + "px";

}

/* MOVE RIGHT */

function moveRight(){

pos += 20;

if(pos > window.innerWidth - 120){
pos = window.innerWidth - 120;
}

player.style.left = pos + "px";

}

/* JUMP */

function jump(){

player.style.bottom = "180px";

setTimeout(()=>{

player.style.bottom = "110px";

},300);

}

/* ATTACK */

function attack(){

const enemy = document.querySelector(".right");

enemy.style.transform =
"scaleX(-1) translateX(25px)";

setTimeout(()=>{

enemy.style.transform =
"scaleX(-1)";

},150);

}

</script>
