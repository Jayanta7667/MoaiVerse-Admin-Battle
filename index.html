<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>MOAIVERSE FIGHT X</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

#game{
position:relative;
width:min(100vw,430px);
height:min(100vh,900px);
aspect-ratio:9/16;
overflow:hidden;
border:3px solid #f1c40f;
box-shadow:
0 0 30px rgba(241,196,15,.6),
0 0 100px rgba(241,196,15,.15);
background:#000;
}

.bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:
brightness(.45)
contrast(1.1)
saturate(1.1);
}

#game::before{
content:"";
position:absolute;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.02) 0px,
rgba(255,255,255,.02) 1px,
transparent 2px,
transparent 4px
);
pointer-events:none;
z-index:1000;
}

#hud{
position:absolute;
top:10px;
left:0;
width:100%;
padding:0 10px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.bar{
width:125px;
height:15px;
background:#111;
border:2px solid rgba(241,196,15,.6);
border-radius:4px;
overflow:hidden;
}

.hp{
height:100%;
background:
linear-gradient(
90deg,
#2ecc71,
#f1c40f,
#f39c12
);
transition:.2s;
}

#timer{
color:#f1c40f;
font-size:24px;
font-weight:bold;
font-family:monospace;
background:#111;
padding:4px 12px;
border:2px solid rgba(241,196,15,.4);
border-radius:5px;
}

.fighter{
position:absolute;
bottom:95px;
width:170px;
height:auto;
z-index:10;
transition:
left .08s linear,
right .08s linear,
transform .08s linear;
filter:
drop-shadow(0 0 10px #000)
drop-shadow(0 0 25px rgba(255,255,255,.08));
}

#p1{
left:20px;
}

#p2{
right:20px;
transform:scaleX(-1);
}

.walk{
animation:walk .22s infinite alternate;
}

@keyframes walk{
0%{
transform:translateY(0px);
}
100%{
transform:translateY(-6px);
}
}

.punch{
animation:punch .18s linear;
}

@keyframes punch{
0%{
transform:translateX(0px);
}
50%{
transform:translateX(28px)
scale(1.05);
}
100%{
transform:translateX(0px);
}
}

.kick{
animation:kick .25s linear;
}

@keyframes kick{
0%{
transform:translateX(0px);
}
50%{
transform:
translateX(35px)
translateY(-12px)
scale(1.08);
}
100%{
transform:translateX(0px);
}
}

.jump{
animation:jump .5s linear;
}

@keyframes jump{
0%{
bottom:95px;
}
50%{
bottom:220px;
}
100%{
bottom:95px;
}
}

.hit{
animation:hit .15s linear;
}

@keyframes hit{
0%{
filter:brightness(1);
}
50%{
filter:brightness(3);
transform:
translateX(-20px)
rotate(-3deg);
}
100%{
filter:brightness(1);
transform:translateX(0px);
}
}

.flash{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:
radial-gradient(
circle,
rgba(255,255,255,.95),
rgba(255,255,255,0)
);
pointer-events:none;
z-index:50;
animation:flash .25s linear forwards;
}

@keyframes flash{
0%{
transform:scale(.2);
opacity:1;
}
100%{
transform:scale(2);
opacity:0;
}
}

#controls{
position:absolute;
bottom:10px;
left:0;
width:100%;
padding:0 10px;
display:flex;
justify-content:space-between;
z-index:200;
}

.leftCtrl,
.rightCtrl{
display:flex;
gap:10px;
}

.btn{
width:62px;
height:62px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(15,15,15,.92);
border:2px solid rgba(241,196,15,.55);
color:#f1c40f;
font-size:25px;
font-weight:bold;
border-radius:12px;
box-shadow:
0 0 15px rgba(241,196,15,.2);
}

.big{
width:90px;
font-size:18px;
}

#overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:500;
}

#overlay h1{
font-size:48px;
color:#f1c40f;
text-shadow:
0 0 25px #f39c12;
}

#overlay button{
margin-top:20px;
padding:14px 32px;
font-size:18px;
background:#111;
border:2px solid #f1c40f;
color:#f1c40f;
border-radius:10px;
}

</style>
</head>

<body>

<div id="game">

<img src="Background.png" class="bg">

<div id="hud">

<div class="bar">
<div class="hp" id="hp1"></div>
</div>

<div id="timer">60</div>

<div class="bar">
<div class="hp" id="hp2"></div>
</div>

</div>

<img src="Hero2.png" id="p1" class="fighter">
<img src="Enemy1.png" id="p2" class="fighter">

<div id="controls">

<div class="leftCtrl">
<div class="btn" id="left">◀</div>
<div class="btn" id="right">▶</div>
</div>

<div class="rightCtrl">
<div class="btn" id="jump">⬆</div>
<div class="btn big" id="kick">🦵</div>
<div class="btn big" id="punch">👊</div>
</div>

</div>

<div id="overlay">
<h1 id="result">YOU WIN</h1>
<button onclick="location.reload()">
PLAY AGAIN
</button>
</div>

</div>

p2.classList.remove("hit");
},150);

finish("YOU WIN");
}

}
