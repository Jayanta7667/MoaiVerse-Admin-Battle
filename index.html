<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MoaiVerse Admin Battle</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.player{
position:absolute;
bottom:80px;
width:170px;
transition:0.08s linear;
}

#p1{
left:40px;
}

#p2{
right:40px;
transform:scaleX(-1);
}

.hpbar{
position:absolute;
top:20px;
width:35%;
height:25px;
background:#333;
border:3px solid white;
border-radius:20px;
overflow:hidden;
}

.hp{
height:100%;
background:lime;
width:100%;
transition:0.2s;
}

#hp1box{
left:10px;
}

#hp2box{
right:10px;
}

.controls{
position:absolute;
bottom:15px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

.leftBtns,.rightBtns{
display:flex;
gap:12px;
}

.btn{
width:75px;
height:75px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:26px;
font-weight:bold;
backdrop-filter:blur(4px);
}

.title{
position:absolute;
top:55px;
width:100%;
text-align:center;
color:white;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px purple;
}
</style>
</head>

<body>

<div id="game">

<img src="Background.png" class="bg">

<div class="title">
MOAIVERSE ADMIN BATTLE
</div>

<div id="hp1box" class="hpbar">
<div id="hp1" class="hp"></div>
</div>

<div id="hp2box" class="hpbar">
<div id="hp2" class="hp"></div>
</div>

<img src="Hero2.png" id="p1" class="player">
<img src="Enemy1.png" id="p2" class="player">

<div class="controls">

<div class="leftBtns">
<button class="btn" ontouchstart="moveLeft()">◀</button>
<button class="btn" ontouchstart="moveRight()">▶</button>
</div>

<div class="rightBtns">
<button class="btn" ontouchstart="attack()">👊</button>
<button class="btn" ontouchstart="jump()">⬆</button>
</div>

</div>

</div>

<script>

let p1 = document.getElementById("p1");
let p2 = document.getElementById("p2");

let hp2 = document.getElementById("hp2");

let x = 40;
let y = 80;

let enemyHp = 100;

function update(){
p1.style.left = x + "px";
p1.style.bottom = y + "px";
}

function moveLeft(){
x -= 25;
if(x < 0) x = 0;
update();
}

function moveRight(){
x += 25;
if(x > window.innerWidth - 170)
x = window.innerWidth - 170;
update();
}

function jump(){

y = 220;
update();

setTimeout(()=>{
y = 80;
update();
},350);

}

function attack(){

p1.style.transform = "scale(1.1)";

setTimeout(()=>{
p1.style.transform = "scale(1)";
},120);

let p1Rect = p1.getBoundingClientRect();
let p2Rect = p2.getBoundingClientRect();

if(
p1Rect.right > p2Rect.left
){

enemyHp -= 10;

if(enemyHp < 0)
enemyHp = 0;

hp2.style.width = enemyHp + "%";

p2.style.filter = "brightness(2)";

setTimeout(()=>{
p2.style.filter = "brightness(1)";
},120);

if(enemyHp <= 0){

p2.style.display = "none";

setTimeout(()=>{
alert("YOU WIN 🔥");
},200);

}

}

}

update();

</script>

</body>
</html>
