<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOAIVERSE ADMIN BATTLE</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

.game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.floor{
position:absolute;
bottom:0;
width:100%;
height:25%;
background:rgba(0,0,0,0.4);
}

.top{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
z-index:10;
}

.hp{
width:35%;
height:18px;
background:#222;
border:2px solid white;
border-radius:20px;
overflow:hidden;
}

.fill{
width:100%;
height:100%;
background:red;
}

.timer{
color:yellow;
font-size:35px;
font-weight:bold;
}

.character{
position:absolute;
bottom:90px;
width:140px;
transition:0.15s;
}

.left{
left:20px;
animation:idle1 1s infinite alternate;
}

.right{
right:20px;
transform:scaleX(-1);
animation:idle2 1s infinite alternate;
}

.character img{
width:100%;
}

@keyframes idle1{
from{
transform:translateY(0px);
}
to{
transform:translateY(-8px);
}
}

@keyframes idle2{
from{
transform:scaleX(-1) translateY(0px);
}
to{
transform:scaleX(-1) translateY(-8px);
}
}

.controls-left{
position:absolute;
bottom:20px;
left:20px;
display:flex;
gap:10px;
z-index:10;
}

.controls-right{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:10px;
z-index:10;
}

.btn{
width:65px;
height:65px;
border-radius:50%;
background:rgba(255,255,255,0.2);
border:2px solid rgba(255,255,255,0.5);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
}

</style>
</head>

<body>

<div class="game">

<img src="Background.png" class="bg">

<div class="floor"></div>

<div class="top">

<div class="hp">
<div class="fill"></div>
</div>

<div class="timer">40</div>

<div class="hp">
<div class="fill"></div>
</div>

</div>

<div class="character left" id="player">
<img src="Hero1.png">
</div>

<div class="character right" id="enemy">
<img src="Enemy1.png">
</div>

<div class="controls-left">
<div class="btn" onclick="moveLeft()">◀</div>
<div class="btn" onclick="moveRight()">▶</div>
</div>

<div class="controls-right">
<div class="btn" onclick="attack()">👊</div>
<div class="btn" onclick="jump()">▲</div>
</div>

</div>

<script>

const player = document.getElementById("player");

let pos = 20;

function moveLeft(){

pos -= 20;

if(pos < 0){
pos = 0;
}

player.style.left = pos + "px";

}

function moveRight(){

pos += 20;

if(pos > window.innerWidth - 140){
pos = window.innerWidth - 140;
}

player.style.left = pos + "px";

}

function jump(){

player.style.bottom = "180px";

setTimeout(()=>{

player.style.bottom = "90px";

},300);

}

function attack(){

const enemy = document.getElementById("enemy");

enemy.style.transform =
"scaleX(-1) translateX(25px)";

setTimeout(()=>{

enemy.style.transform =
"scaleX(-1)";

},150);

}

</script>

</body>
</html>
