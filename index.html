<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MoaiVerse Admin Battle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;background:#000;font-family:Arial,sans-serif;touch-action:none;user-select:none;}
#game{position:relative;width:100vw;height:100vh;overflow:hidden;}
.bg{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;}
#selectScreen{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);}
#selectScreen h1{color:#f1c40f;font-size:clamp(22px,5vw,42px);font-weight:900;text-shadow:0 0 20px #e74c3c;letter-spacing:2px;margin-bottom:18px;text-align:center;}
.selectRow{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.selectBox{display:flex;flex-direction:column;align-items:center;gap:6px;}
.selectBox label{color:#aaa;font-size:13px;font-weight:bold;}
.selectBox select{background:#111;color:#fff;border:2px solid #7b2ff7;border-radius:10px;padding:8px 14px;font-size:15px;width:140px;outline:none;}
#fightBtn{padding:14px 48px;border-radius:20px;background:linear-gradient(90deg,#f39c12,#e74c3c);color:#fff;font-size:22px;font-weight:900;border:4px solid #f1c40f;cursor:pointer;box-shadow:0 4px 24px rgba(231,76,60,0.6);}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;padding:10px 12px;display:none;}
.hudRow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.hpWrap{display:flex;flex-direction:column;gap:3px;width:42%;}
.hpName{color:#fff;font-size:11px;font-weight:bold;}
.hpBg{height:20px;background:#333;border-radius:20px;overflow:hidden;border:2px solid rgba(255,255,255,0.2);}
.hpFill{height:100%;border-radius:20px;transition:width 0.2s;}
.timer{color:#f1c40f;font-size:clamp(20px,4vw,30px);font-weight:900;font-family:'Courier New',monospace;text-shadow:0 0 10px #e74c3c;background:rgba(0,0,0,0.6);padding:4px 14px;border-radius:10px;min-width:64px;text-align:center;}
#p1,#p2{position:absolute;width:clamp(100px,18vw,190px);transition:filter 0.1s;z-index:5;}
#p1{bottom:80px;left:40px;}
#p2{bottom:80px;right:40px;transform:scaleX(-1);}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:10px 16px 14px;display:none;justify-content:space-between;align-items:flex-end;}
.leftC{display:flex;gap:10px;}
.rightC{display:flex;flex-direction:column;align-items:center;gap:8px;}
.rightTop{display:flex;gap:10px;}
.btn{width:clamp(52px,12vw,70px);height:clamp(52px,12vw,70px);border-radius:14px;border:3px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.55);color:#fff;font-size:clamp(18px,4vw,24px);font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);}
.btn.pressed{transform:scale(0.9);background:rgba(255,255,255,0.18);}
#punchBtn{background:rgba(180,80,0,0.5);border-color:rgba(255,180,50,0.5);}
#blockBtn{background:rgba(0,60,180,0.5);border-color:rgba(80,140,255,0.5);}
.jumpBtn{width:clamp(110px,25vw,140px)!important;height:clamp(44px,10vw,54px)!important;font-size:15px!important;}
#overlay{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);text-align:center;}
#overlay h2{color:#f1c40f;font-size:clamp(32px,8vw,64px);font-weight:900;text-shadow:0 0 24px #e74c3c;margin-bottom:16px;}
#overlay p{color:#ecf0f1;font-size:clamp(14px,3vw,22px);margin-bottom:24px;}
#restartBtn{padding:12px 40px;border-radius:16px;background:linear-gradient(90deg,#f39c12,#e74c3c);color:#fff;font-size:20px;font-weight:900;border:3px solid #f1c40f;cursor:pointer;}
.hit{filter:brightness(3)!important;}
</style>
</head>
<body>
<div id="game">
  <img src="Background.png" class="bg">

  <div id="selectScreen">
    <h1>⚔️ MOAIVERSE BATTLE ⚔️</h1>
    <div class="selectRow">
      <div class="selectBox">
        <label>🦸 HERO</label>
        <select id="heroSel">
          <option value="Hero1">Hero 1</option>
          <option value="Hero2">Hero 2</option>
          <option value="Hero3">Hero 3</option>
          <option value="Hero4">Hero 4</option>
        </select>
      </div>
      <div class="selectBox">
        <label>👹 ENEMY</label>
        <select id="enemySel">
          <option value="Enemy1">Enemy 1</option>
          <option value="Enemy2">Enemy 2</option>
          <option value="Enemy3">Enemy 3</option>
          <option value="Enemy4">Enemy 4</option>
        </select>
      </div>
    </div>
    <button id="fightBtn">⚔️ FIGHT!</button>
  </div>

  <div id="hud">
    <div class="hudRow">
      <div class="hpWrap">
        <div class="hpName" id="heroName">HERO</div>
        <div class="hpBg"><div class="hpFill" id="hp1Fill" style="width:100%;background:linear-gradient(90deg,#2ecc71,#f39c12)"></div></div>
      </div>
      <div class="timer" id="timerEl">60</div>
      <div class="hpWrap" style="align-items:flex-end">
        <div class="hpName" id="enemyName">ENEMY</div>
        <div class="hpBg" style="direction:rtl"><div class="hpFill" id="hp2Fill" style="width:100%;background:linear-gradient(90deg,#e74c3c,#e67e22)"></div></div>
      </div>
    </div>
  </div>

  <img src="Hero2.png" id="p1">
  <img src="Enemy1.png" id="p2">

  <div id="controls">
    <div class="leftC">
      <div class="btn" id="leftBtn">◀</div>
      <div class="btn" id="rightBtn">▶</div>
    </div>
    <div class="rightC">
      <div class="rightTop">
        <div class="btn" id="blockBtn">🛡️</div>
        <div class="btn" id="punchBtn">👊</div>
      </div>
      <div class="btn jumpBtn" id="jumpBtn">▲ JUMP</div>
    </div>
  </div>

  <div id="overlay" style="display:none">
    <h2 id="overlayTitle">YOU WIN!</h2>
    <p id="overlayMsg">Tap to play again</p>
    <button id="restartBtn">🔄 PLAY AGAIN</button>
  </div>
</div>

<script>
const p1El=document.getElementById('p1'),p2El=document.getElementById('p2');
const selectScreen=document.getElementById('selectScreen'),hud=document.getElementById('hud');
const controls=document.getElementById('controls'),overlay=document.getElementById('overlay');
const timerEl=document.getElementById('timerEl'),hp1Fill=document.getElementById('hp1Fill'),hp2Fill=document.getElementById('hp2Fill');

const GW=()=>window.innerWidth,GH=()=>window.innerHeight;
const FLOOR_BOTTOM=80,SPEED=7,JUMP_VEL=-18,GRAVITY=0.8,MAX_HP=100,GAME_TIME=60;
const FW=()=>p1El.offsetWidth;

let p1,p2,gameRunning=false,gameTimer=0,rafId=0,lastTs=0;
const keys={},touch={};

function makeFighter(side){
  const x=side==='p1'?40:GW()-FW()-40;
  return{x,y:0,vx:0,vy:0,hp:MAX_HP,attacking:false,atkCD:0,hitCD:0,
    hurt:false,hurtTimer:0,blocking:false,jumping:false,facing:side==='p1'?1:-1,side};
}

function setHP(bar,pct){
  bar.style.width=Math.max(0,pct)+'%';
  bar.style.background=pct>50?'linear-gradient(90deg,#2ecc71,#f39c12)':pct>25?'linear-gradient(90deg,#f39c12,#e67e22)':'linear-gradient(90deg,#e74c3c,#c0392b)';
}

function flashHit(el){el.classList.add('hit');setTimeout(()=>el.classList.remove('hit'),120);}

function applyPos(f,el){
  const bottom=FLOOR_BOTTOM+(-f.y);
  if(f.side==='p1'){el.style.left=f.x+'px';el.style.right='';}
  else{el.style.right=(GW()-f.x-FW())+'px';el.style.left='';}
  el.style.bottom=bottom+'px';
  el.style.transform=f.side==='p2'?'scaleX(-1)':'';
}

function checkAttack(a,d,dEl,hpBar){
  if(a.hitCD>0)return;
  const aC=a.x+FW()/2,dC=d.x+FW()/2;
  if(Math.abs(aC-dC)<FW()*1.3){
    const dmg=d.blocking?3:10;
    d.hp=Math.max(0,d.hp-dmg);
    setHP(hpBar,d.hp);
    if(!d.blocking){flashHit(dEl);d.hurt=true;d.hurtTimer=18;d.vx=a.facing*5;d.vy=-4;}
    a.hitCD=20;
  }
}

function updatePhysics(f,el,dt){
  f.vy+=GRAVITY*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;
  if(f.y>=0){f.y=0;f.vy=0;f.jumping=false;}
  const mx=GW()-FW();if(f.x<0)f.x=0;if(f.x>mx)f.x=mx;
  applyPos(f,el);
}

function gameLoop(ts){
  if(!gameRunning)return;
  const dt=Math.min((ts-lastTs)/16.67,3);lastTs=ts;

  const goL=keys['ArrowLeft']||keys['KeyA']||touch['left'];
  const goR=keys['ArrowRight']||keys['KeyD']||touch['right'];
  const doJ=keys['ArrowUp']||keys['KeyW']||keys['Space']||touch['jump'];
  const doP=keys['KeyZ']||keys['KeyJ']||touch['punch'];
  const doB=keys['KeyX']||keys['KeyK']||touch['block'];

  p1.blocking=!!(doB&&!p1.attacking);
  if(goL){p1.vx=-SPEED;p1.facing=-1;}else if(goR){p1.vx=SPEED;p1.facing=1;}else p1.vx*=0.6;
  if(doJ&&!p1.jumping){p1.vy=JUMP_VEL;p1.jumping=true;}
  if(doP&&!p1.attacking&&!p1.blocking&&p1.atkCD<=0){
    p1.attacking=true;p1.atkCD=25;
    setTimeout(()=>{p1.attacking=false;},250);
    checkAttack(p1,p2,p2El,hp2Fill);
  }
  updatePhysics(p1,p1El,dt);

  const dist=(p1.x+FW()/2)-(p2.x+FW()/2),ad=Math.abs(dist);
  p2.blocking=false;p2.facing=dist>0?1:-1;
  if(ad>260){p2.vx=dist>0?SPEED*0.75:-SPEED*0.75;}
  else if(ad<110){p2.vx=dist>0?-SPEED*0.5:SPEED*0.5;}
  else{
    p2.vx*=0.65;
    if(p2.atkCD<=0&&Math.random()<0.022){
      p2.attacking=true;p2.atkCD=28;
      setTimeout(()=>{p2.attacking=false;},260);
      checkAttack(p2,p1,p1El,hp1Fill);
    }
    if(!p2.jumping&&Math.random()<0.008){p2.vy=JUMP_VEL*0.85;p2.jumping=true;}
    if(Math.random()<0.006)p2.blocking=true;
  }
  updatePhysics(p2,p2El,dt);

  if(p1.atkCD>0)p1.atkCD--;if(p2.atkCD>0)p2.atkCD--;
  if(p1.hurtTimer>0){p1.hurtTimer--;if(!p1.hurtTimer)p1.hurt=false;}
  if(p2.hurtTimer>0){p2.hurtTimer--;if(!p2.hurtTimer)p2.hurt=false;}

  gameTimer-=dt/60;if(gameTimer<0)gameTimer=0;
  timerEl.textContent=String(Math.ceil(gameTimer)).padStart(2,'0');
  timerEl.style.color=gameTimer<=10?'#e74c3c':'#f1c40f';

  if(p1.hp<=0||p2.hp<=0||gameTimer<=0){endGame();return;}
  rafId=requestAnimationFrame(gameLoop);
}

function startGame(){
  const hN=document.getElementById('heroSel').value;
  const eN=document.getElementById('enemySel').value;
  p1El.src=hN+'.png';p2El.src=eN+'.png';
  document.getElementById('heroName').textContent=hN.toUpperCase();
  document.getElementById('enemyName').textContent=eN.toUpperCase();
  p1=makeFighter('p1');p2=makeFighter('p2');
  setHP(hp1Fill,100);setHP(hp2Fill,100);
  gameTimer=GAME_TIME;gameRunning=true;
  selectScreen.style.display='none';hud.style.display='block';
  controls.style.display='flex';overlay.style.display='none';
  applyPos(p1,p1El);applyPos(p2,p2El);
  lastTs=performance.now();rafId=requestAnimationFrame(gameLoop);
}

function endGame(){
  gameRunning=false;cancelAnimationFrame(rafId);
  let title,msg;
  if(p1.hp<=0&&p2.hp<=0){title='DRAW!';msg='Both fighters are down!';}
  else if(p1.hp<=0){title='YOU LOSE 💀';msg='The enemy wins this round!';}
  else if(p2.hp<=0){title='YOU WIN 🔥';msg='Enemy defeated! Amazing!';}
  else if(p1.hp>p2.hp){title='YOU WIN 🔥';msg='Time up — you had more HP!';}
  else if(p2.hp>p1.hp){title='YOU LOSE 💀';msg='Time up — enemy had more HP!';}
  else{title='DRAW!';msg='Time up — equal HP!';}
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlayMsg').textContent=msg;
  overlay.style.display='flex';
}

function restartGame(){
  overlay.style.display='none';hud.style.display='none';controls.style.display='none';
  selectScreen.style.display='flex';
}

document.getElementById('fightBtn').addEventListener('pointerdown',startGame);
document.getElementById('restartBtn').addEventListener('pointerdown',restartGame);
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(e.code==='Enter')startGame();
  if(e.code==='KeyR')restartGame();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function bindBtn(id,key){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{touch[key]=true;el.classList.add('pressed');e.preventDefault();},{passive:false});
  el.addEventListener('pointerup',()=>{touch[key]=false;el.classList.remove('pressed');});
  el.addEventListener('pointerleave',()=>{touch[key]=false;el.classList.remove('pressed');});
  el.addEventListener('pointercancel',()=>{touch[key]=false;el.classList.remove('pressed');});
}
bindBtn('leftBtn','left');bindBtn('rightBtn','right');
bindBtn('jumpBtn','jump');bindBtn('punchBtn','punch');bindBtn('blockBtn','block');
</script>
</body>
</html>
