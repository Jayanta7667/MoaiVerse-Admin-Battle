<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MOAIVERSE ADMIN BATTLE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

.game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* Background */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Top UI */

.top-bar{
    position:absolute;
    top:15px;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 15px;
    z-index:10;
}

.hp{
    width:120px;
    height:20px;
    border-radius:20px;
    background:#222;
    border:2px solid white;
    overflow:hidden;
}

.hp-fill{
    width:100%;
    height:100%;
    background:lime;
}

/* Title */

.title{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:20px;
    z-index:10;
    text-shadow:0 0 10px purple;
}

/* Characters */

.character{
    position:absolute;
    bottom:70px;
    width:180px;
    z-index:5;
    transition:0.2s;
}

.left{
    left:20px;
    animation:leftMove 2s infinite alternate;
}

.right{
    right:20px;
    animation:rightMove 2s infinite alternate;
}

.character img{
    width:100%;
    height:auto;
    filter:drop-shadow(0 0 20px purple);
}

/* Floating movement */

@keyframes leftMove{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-15px);
    }
}

@keyframes rightMove{
    from{
        transform:translateY(-10px);
    }
    to{
        transform:translateY(10px);
    }
}

/* Attack effect */

.effect{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(162,0,255,0.5);
    filter:blur(25px);
    animation:pulse 1s infinite;
}

.effect-left{
    bottom:220px;
    left:170px;
}

.effect-right{
    bottom:220px;
    right:170px;
}

@keyframes pulse{
    0%{
        transform:scale(0.8);
        opacity:0.5;
    }
    100%{
        transform:scale(1.3);
        opacity:1;
    }
}

/* Buttons */

.controls{
    position:absolute;
    bottom:15px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
    z-index:10;
}

button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:purple;
    color:white;
    font-size:16px;
    font-weight:bold;
}

button:active{
    transform:scale(0.95);
}

/* Mobile */

@media(max-width:600px){

.character{
    width:140px;
}

.title{
    font-size:15px;
}

.hp{
    width:100px;
    height:16px;
}

.effect{
    width:80px;
    height:80px;
}

.effect-left{
    left:110px;
}

.effect-right{
    right:110px;
}

}

</style>
</head>

<body>

<div class="game">

<img src="Background.png" class="bg">

<div class="top-bar">
    <div class="hp"><div class="hp-fill"></div></div>
    <div class="hp"><div class="hp-fill"></div></div>
</div>

<div class="title">
    MOAIVERSE ADMIN BATTLE
</div>

<!-- Effects -->

<div class="effect effect-left"></div>
<div class="effect effect-right"></div>

<!-- Characters -->

<div class="character left">
    <img src="Enemy1.png">
</div>

<div class="character right">
    <img src="Hero1.png">
</div>

<!-- Controls -->

<div class="controls">
    <button onclick="attack()">ATTACK</button>
    <button onclick="changeHero()">CHANGE HERO</button>
</div>

</div>

<script>

const left = document.querySelector(".left");
const right = document.querySelector(".right");

function attack(){

    right.style.transform = "translateX(-70px) scale(1.1)";

    setTimeout(()=>{
        right.style.transform = "";
    },300);

}

let hero = 1;

function changeHero(){

    hero++;

    if(hero > 4){
        hero = 1;
    }

    document.querySelector(".right img").src = "Hero" + hero + ".png";
}

</script>

</body>
</html>
