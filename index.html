<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOAI FIGHT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#arena{
position:relative;
width:390px;
height:780px;
border:3px solid #ffd000;
box-shadow:0 0 30px #ffd000;
overflow:hidden;
background:#000;
}

#bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.hud{
position:absolute;
top:15px;
left:15px;
right:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.hp{
width:120px;
height:16px;
border:2px solid #ffd000;
border-radius:20px;
overflow:hidden;
background:#222;
}

.hpFill{
height:100%;
background:linear-gradient(90deg,#00ff88,#ffcc00);
}

#timer{
color:#ffd000;
font-size:32px;
font-weight:bold;
}

.fighter{
position:absolute;
width:170px;
height:220px;
bottom:120px;
}

.body{
position:absolute;
width:170px;
height:220px;

background-size:1020px 220px;

animation:idle .7s steps(6) infinite;
transform-origin:center bottom;
}

.face{
position:absolute;
width:58px;
height:58px;
border-radius:50%;
object-fit:cover;
top:18px;
left:56px;
z-index:10;
border:2px solid white;
}

#p1{
left:30px;
}

#p2{
right:30px;
transform:scaleX(-1);
}

.controls{
position:absolute;
bottom:15px;
left:15px;
right:15px;
display:flex;
justify-content:space-between;
z-index:100;
}

.moveBtns,
.attackBtns{
display:flex;
gap:10px;
}

.btn{
width:64px;
height:64px;
border:none;
border-radius:14px;
background:#111;
color:#ffd000;
font-size:28px;
font-weight:bold;
border:2px solid #ffd000;
}

.btn:active{
transform:scale(.9);
}

.hit{
animation:hit .25s;
}

.jump{
animation:jump .6s linear;
}

.punch{
animation:punch .3s linear;
}

@keyframes idle{
from{
background-position:0 0;
}
to{
background-position:-1020px 0;
}
}

@keyframes punch{
0%{
transform:translateX(0);
}
50%{
transform:translateX(25px);
}
100%{
transform:translateX(0);
}
}

@keyframes jump{
0%{
bottom:120px;
}
50%{
bottom:220px;
}
100%{
bottom:120px;
}
}

@keyframes hit{
0%{
filter:brightness(1);
}
50%{
filter:brightness(4);
}
100%{
filter:brightness(1);
}
}

</style>
</head>

<body>

<div id="game">

<div id="arena">

<img src="Background.png" id="bg">

<div class="hud">

<div class="hp">
<div class="hpFill" id="hp1"></div>
</div>

<div id="timer">60</div>

<div class="hp">
<div class="hpFill" id="hp2"></div>
</div>

</div>

<div class="fighter" id="p1">

<div class="body"
id="body1"
style="background-image:url('fighter-sprite.png')">
</div>

<img src="face1.png" class="face">

</div>

<div class="fighter" id="p2">

<div class="body"
id="body2"
style="background-image:url('fighter-sprite.png')">
</div>

<img src="face2.png" class="face">

</div>

<div class="controls">

<div class="moveBtns">

<button class="btn" id="leftBtn">◀</button>

<button class="btn" id="rightBtn">▶</button>

<button class="btn" id="jumpBtn">⬆</button>

</div>

<div class="attackBtns">

<button class="btn" id="kickBtn">🦶</button>

<button class="btn" id="punchBtn">👊</button>

</div>

</div>

</div>

</div>

<script>

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");

const hp1 = document.getElementById("hp1");
const hp2 = document.getElementById("hp2");

let p1x = 30;
let p2x = 190;

let hpPlayer = 100;
let hpEnemy = 100;

function update(){

p1.style.left = p1x + "px";
p2.style.right = (390 - p2x - 170) + "px";

hp1.style.width = hpPlayer + "%";
hp2.style.width = hpEnemy + "%";

}

update();

document.getElementById("leftBtn").onclick = ()=>{

p1x -= 15;

if(p1x < 0){
p1x = 0;
}

update();

};

document.getElementById("rightBtn").onclick = ()=>{

p1x += 15;

if(p1x > 210){
p1x = 210;
}

update();

};

document.getElementById("jumpBtn").onclick = ()=>{

p1.classList.add("jump");

setTimeout(()=>{
p1.classList.remove("jump");
},600);

};

document.getElementById("punchBtn").onclick = ()=>{

p1.classList.add("punch");

setTimeout(()=>{
p1.classList.remove("punch");
},300);

let distance = Math.abs(p1x - p2x);

if(distance < 120){

hpEnemy -= 10;

if(hpEnemy < 0){
hpEnemy = 0;
}

p2.classList.add("hit");

setTimeout(()=>{
p2.classList.remove("hit");
},250);

update();

}

};

document.getElementById("kickBtn").onclick = ()=>{

let distance = Math.abs(p1x - p2x);

if(distance < 130){

hpEnemy -= 15;

if(hpEnemy < 0){
hpEnemy = 0;
}

p2.classList.add("hit");

setTimeout(()=>{
p2.classList.remove("hit");
},250);

update();

}

};

setInterval(()=>{

if(hpEnemy <= 0){
alert("YOU WIN");
location.reload();
}

if(hpPlayer <= 0){
alert("YOU LOSE");
location.reload();
}

let ai = Math.random();

if(ai > .5){

p2x -= 10;

}else{

p2x += 10;

}

if(p2x < 120){
p2x = 120;
}

if(p2x > 250){
p2x = 250;
}

let dist = Math.abs(p1x - p2x);

if(dist < 120){

hpPlayer -= 5;

if(hpPlayer < 0){
hpPlayer = 0;
}

p1.classList.add("hit");

setTimeout(()=>{
p1.classList.remove("hit");
},250);

}

update();

},800);

let time = 60;

setInterval(()=>{

time--;

document.getElementById("timer").innerText = time;

if(time <= 0){

if(hpPlayer > hpEnemy){

alert("PLAYER WIN");

}else if(hpEnemy > hpPlayer){

alert("ENEMY WIN");

}else{

alert("DRAW");

}

location.reload();

}

},1000);

</script>

</body>
</html>
