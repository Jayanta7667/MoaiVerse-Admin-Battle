<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MoaiVerse Admin Battle</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:black;
overflow:hidden;
touch-action:none;
font-family:Arial;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

#hud{
position:absolute;
top:10px;
left:0;
width:100%;
z-index:20;
padding:0 10px;
}

.hudRow{
display:flex;
align-items:center;
gap:10px;
}

.hpTrack{
flex:1;
height:22px;
background:#222;
border-radius:20px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.2);
}

.hp{
height:100%;
width:100%;
transition:0.2s;
background:linear-gradient(90deg,#2ecc71,#f1c40f);
}

.timer{
color:#f1c40f;
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,0.7);
padding:4px 14px;
border-radius:10px;
}

#p1,#p2{
position:absolute;
bottom:110px;
width:min(52vw,380px);
z-index:10;
transform-origin:bottom center;
filter:drop-shadow(0 0 18px rgba(0,0,0,0.7));
}

#p1{
left:40px;
}

#p2{
right:40px;
transform:scaleX(-1);
}

.running{
animation:runAnim 0.25s infinite;
}

@keyframes runAnim{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

.punch{
animation:punchAnim 0.22s;
}

.kick{
animation:kickAnim 0.25s;
}

.hurt{
animation:hurtAnim 0.2s;
}

@keyframes punchAnim{
0%{transform:scaleX(var(--fx)) translateX(0);}
50%{transform:scaleX(var(--fx)) translateX(calc(var(--fx)*24px)) rotate(calc(var(--fx)*-8deg));}
100%{transform:scaleX(var(--fx)) translateX(0);}
}

@keyframes kickAnim{
0%{transform:scaleX(var(--fx));}
50%{transform:scaleX(var(--fx)) translateY(-18px) rotate(calc(var(--fx)*10deg));}
100%{transform:scaleX(var(--fx));}
}

@keyframes hurtAnim{
0%{transform:scaleX(var(--fx));}
30%{transform:scaleX(var(--fx)) translateX(calc(var(--fx)*-18px));filter:brightness(4);}
100%{transform:scaleX(var(--fx));}
}

#controls{
position:absolute;
bottom:10px;
left:0;
width:100%;
padding:0 12px;
display:flex;
justify-content:space-between;
align-items:flex-end;
z-index:30;
}

.group{
display:flex;
gap:10px;
}

.btn{
width:76px;
height:76px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:white;
border:3px solid rgba(255,255,255,0.2);
backdrop-filter:blur(4px);
}

.move{
background:rgba(40,40,100,0.8);
}

.attack{
background:rgba(180,60,0,0.8);
}

.kickBtn{
background:rgba(140,0,200,0.8);
}

.jumpBtn{
background:rgba(0,120,0,0.8);
}

.blockBtn{
background:rgba(0,80,200,0.8);
}

.hitFx{
position:absolute;
font-size:48px;
z-index:40;
pointer-events:none;
animation:hitFx 0.4s forwards;
}

@keyframes hitFx{
0%{opacity:1;transform:scale(0.5);}
100%{opacity:0;transform:scale(1.8);}
}

#overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:100;
}

#overlay h1{
font-size:70px;
color:#f1c40f;
text-shadow:0 0 30px red;
}

#overlay button{
margin-top:20px;
padding:16px 40px;
font-size:24px;
border:none;
border-radius:16px;
background:#e74c3c;
color:white;
}
</style>
</head>

<body>

<div id="game">

<img src="Background.png" class="bg">

<div id="hud">
<div class="hudRow">
<div class="hpTrack">
<div class="hp" id="hp1"></div>
</div>

<div class="timer" id="timer">
60
</div>

<div class="hpTrack">
<div class="hp" id="hp2"></div>
</div>
</div>
</div>

<img src="Hero2.png" id="p1">
<img src="Enemy1.png" id="p2">

<div id="controls">

<div class="group">
<div class="btn move" id="leftBtn">◀</div>
<div class="btn move" id="rightBtn">▶</div>
</div>

<div class="group">
<div class="btn blockBtn" id="blockBtn">🛡️</div>
<div class="btn kickBtn" id="kickBtn">🦵</div>
<div class="btn attack" id="punchBtn">👊</div>
<div class="btn jumpBtn" id="jumpBtn">⬆</div>
</div>

</div>

<div id="overlay">
<h1 id="result">YOU WIN</h1>
<button onclick="location.reload()">PLAY AGAIN</button>
</div>

</div>

<script>

const p1=document.getElementById("p1");
const p2=document.getElementById("p2");

const hp1=document.getElementById("hp1");
const hp2=document.getElementById("hp2");

const timerEl=document.getElementById("timer");

let x1=40;
let x2=window.innerWidth-340;

let y1=110;
let y2=110;

let v1=0;
let v2=0;

let hpHero=100;
let hpEnemy=100;

let time=60;

let keys={};

function update(){

p1.style.left=x1+"px";
p2.style.left=x2+"px";

p1.style.bottom=y1+"px";
p2.style.bottom=y2+"px";

}

function jump(){

if(y1===110){

v1=-30;

}

}

function createFx(x,y,emoji){

const fx=document.createElement("div");

fx.className="hitFx";

fx.innerHTML=emoji;

fx.style.left=x+"px";

fx.style.top=y+"px";

document.getElementById("game").appendChild(fx);

setTimeout(()=>{
fx.remove();
},400);

}

function punch(){

p1.classList.add("punch");

setTimeout(()=>{
p1.classList.remove("punch");
},220);

if(Math.abs(x1-x2)<320){

hpEnemy-=12;

if(hpEnemy<0) hpEnemy=0;

hp2.style.width=hpEnemy+"%";

p2.classList.add("hurt");

createFx(x2+120,window.innerHeight-y2-220,"👊💥");

setTimeout(()=>{
p2.classList.remove("hurt");
},220);

x2+=18;

}

}

function kick(){

p1.classList.add("kick");

setTimeout(()=>{
p1.classList.remove("kick");
},250);

if(Math.abs(x1-x2)<360){

hpEnemy-=18;

if(hpEnemy<0) hpEnemy=0;

hp2.style.width=hpEnemy+"%";

p2.classList.add("hurt");

createFx(x2+120,window.innerHeight-y2-220,"🦵💥");

setTimeout(()=>{
p2.classList.remove("hurt");
},250);

x2+=30;

}

}

function enemyAI(){

if(x2>x1+260){

x2-=4;

}else{

if(Math.random()<0.02){

hpHero-=8;

if(hpHero<0) hpHero=0;

hp1.style.width=hpHero+"%";

p1.classList.add("hurt");

createFx(x1+120,window.innerHeight-y1-220,"💥");

setTimeout(()=>{
p1.classList.remove("hurt");
},220);

}

}

}

function loop(){

if(keys.left){

x1-=11;

p1.classList.add("running");

p1.style.transform="scaleX(-1)";

}else if(keys.right){

x1+=11;

p1.classList.add("running");

p1.style.transform="scaleX(1)";

}else{

p1.classList.remove("running");

}

v1+=1.2;

y1-=v1;

if(y1<110){

y1=110;

v1=0;

}

enemyAI();

update();

if(hpEnemy<=0){

document.getElementById("overlay").style.display="flex";

document.getElementById("result").innerHTML="YOU WIN 🔥";

}

if(hpHero<=0){

document.getElementById("overlay").style.display="flex";

document.getElementById("result").innerHTML="YOU LOSE 💀";

}

requestAnimationFrame(loop);

}

setInterval(()=>{

time--;

if(time<0) time=0;

timerEl.innerHTML=time;

},1000);

document.getElementById("leftBtn").ontouchstart=()=>keys.left=true;
document.getElementById("leftBtn").ontouchend=()=>keys.left=false;

document.getElementById("rightBtn").ontouchstart=()=>keys.right=true;
document.getElementById("rightBtn").ontouchend=()=>keys.right=false;

document.getElementById("jumpBtn").ontouchstart=jump;

document.getElementById("punchBtn").ontouchstart=punch;

document.getElementById("kickBtn").ontouchstart=kick;

update();

loop();

</script>

</body>
</html>
