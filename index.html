<div class="fighter player">

  <div class="head"></div>

  <div class="body">
    <div class="arm left-arm"></div>
    <div class="arm right-arm"></div>

    <div class="torso"></div>

    <div class="leg left-leg"></div>
    <div class="leg right-leg"></div>
  </div>

</div>

<style>

.fighter{
position:absolute;
bottom:100px;
left:40px;
width:140px;
height:260px;
z-index:10;
animation:idle 0.8s infinite alternate;
}

.head{
width:72px;
height:72px;
border-radius:50%;
background:url("HeroFace.png");
background-size:cover;
background-position:center;
position:absolute;
top:0;
left:34px;
border:3px solid #fff;
box-shadow:0 0 15px rgba(255,255,255,.5);
}

.torso{
position:absolute;
top:70px;
left:42px;
width:55px;
height:90px;
background:#111;
border-radius:12px;
border:2px solid #444;
}

.arm{
position:absolute;
width:18px;
height:75px;
background:#222;
top:75px;
border-radius:20px;
transform-origin:top center;
}

.left-arm{
left:20px;
animation:leftArm 0.6s infinite alternate;
}

.right-arm{
right:20px;
animation:rightArm 0.6s infinite alternate;
}

.leg{
position:absolute;
width:20px;
height:90px;
background:#111;
top:150px;
border-radius:20px;
transform-origin:top center;
}

.left-leg{
left:45px;
animation:leftLeg 0.5s infinite alternate;
}

.right-leg{
right:45px;
animation:rightLeg 0.5s infinite alternate;
}

@keyframes idle{
0%{
transform:translateY(0px);
}
100%{
transform:translateY(-5px);
}
}

@keyframes leftArm{
0%{
transform:rotate(20deg);
}
100%{
transform:rotate(-20deg);
}
}

@keyframes rightArm{
0%{
transform:rotate(-20deg);
}
100%{
transform:rotate(20deg);
}
}

@keyframes leftLeg{
0%{
transform:rotate(10deg);
}
100%{
transform:rotate(-10deg);
}
}

@keyframes rightLeg{
0%{
transform:rotate(-10deg);
}
100%{
transform:rotate(10deg);
}
}

.punch .right-arm{
animation:punch 0.2s linear;
}

@keyframes punch{
0%{
transform:rotate(0deg);
}
50%{
transform:rotate(-100deg) translateX(25px);
}
100%{
transform:rotate(0deg);
}
}

.kick .right-leg{
animation:kick 0.25s linear;
}

@keyframes kick{
0%{
transform:rotate(0deg);
}
50%{
transform:rotate(-70deg) translateY(-20px);
}
100%{
transform:rotate(0deg);
}
}

.jump{
animation:jumpAnim .5s linear;
}

@keyframes jumpAnim{
0%{
bottom:100px;
}
50%{
bottom:230px;
}
100%{
bottom:100px;
}
}

</style>

<script>

const fighter=document.querySelector(".fighter");

document.addEventListener("keydown",(e)=>{

if(e.key==="x"){
fighter.classList.add("punch");

setTimeout(()=>{
fighter.classList.remove("punch");
},200);
}

if(e.key==="z"){
fighter.classList.add("kick");

setTimeout(()=>{
fighter.classList.remove("kick");
},250);
}

if(e.key===" "){
fighter.classList.add("jump");

setTimeout(()=>{
fighter.classList.remove("jump");
},500);
}

});

</script>
